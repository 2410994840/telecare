name: TeleCare CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/telecare

jobs:
  # ─── Security Scan ───────────────────────────────────────────
  security-scan:
    name: DevSecOps Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}

  # ─── Backend Tests ───────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm test -- --coverage --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/telecare_test
          JWT_SECRET: test_secret
          AES_SECRET: test_aes_secret_32chars_here!!!!!

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: backend/coverage

  # ─── AI Service Tests ─────────────────────────────────────────
  test-ai:
    name: AI Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
        working-directory: ai-service

      - name: Run tests
        run: pytest tests/ -v
        working-directory: ai-service

  # ─── Frontend Tests ───────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test -- --watchAll=false --coverage
        working-directory: frontend
        env:
          CI: true

  # ─── Build & Push Docker Images ───────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [security-scan, test-backend, test-ai, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace-ingress.yaml
          kubectl set image deployment/telecare-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} -n telecare
          kubectl set image deployment/telecare-frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} -n telecare
          kubectl set image deployment/telecare-ai ai-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai:${{ github.sha }} -n telecare
          kubectl rollout status deployment/telecare-backend -n telecare --timeout=300s
          kubectl rollout status deployment/telecare-frontend -n telecare --timeout=300s

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/telecare-backend -n telecare
          kubectl rollout undo deployment/telecare-frontend -n telecare
          kubectl rollout undo deployment/telecare-ai -n telecare
